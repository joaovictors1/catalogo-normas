<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repertório de normas sobre o (controle do) uso da força</title>
  
  <meta name="description" content="Repertório acadêmico exaustivo de normas nacionais, internacionais e estaduais sobre o controle do uso da força e a militarização. Projeto PIBIC – Universidade Federal de Sergipe.">
  <meta name="keywords" content="uso da força, normas, direito, PIBIC, UFS, militarização, direitos humanos, DIH">
  <meta property="og:title" content="Repertório de Normas sobre o Uso da Força">
  <meta property="og:description" content="83 normas catalogadas sobre controle do uso da força — Estaduais, Federais e Internacionais.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
    rel="stylesheet">

  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet"
    type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "@splinetool/runtime": "https://unpkg.com/@splinetool/runtime@1.9.44/build/runtime.js"
      }
    }
  </script>
</head>

<body>
  <a href="#app-content" class="skip-link">Pular para o conteúdo principal</a>

  <!-- Tela de Carregamento -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Carregando ambiente virtual...</p>
  </div>

  <canvas id="canvas3d"></canvas>
  <script type="module">
    import { Application } from '@splinetool/runtime';
    const canvas = document.getElementById('canvas3d');
    const app = new Application(canvas);
    
    // Lazy load do ambiente 3D para melhorar performance (Performance Phase 7)
    let splineLoaded = false;
    function loadSpline() {
      if (splineLoaded) return;
      splineLoaded = true;
      app.load('https://prod.spline.design/MDqj8k8BrzSkdzO5/scene.splinecode')
        .then(() => {
          const loader = document.getElementById('loader');
          if (loader) {
            loader.classList.add('hidden-loader');
            setTimeout(() => loader.remove(), 500); // Remove do DOM após o fade
          }
        })
        .catch((error) => {
          console.error('Erro ao carregar modelo 3D do Spline:', error);
          const loader = document.getElementById('loader');
          if (loader) {
            loader.innerHTML = '<p style="color: #ef4444;">O ambiente virtual está privado ou indisponível.</p>';
            setTimeout(() => loader.classList.add('hidden-loader'), 3000);
          }
        });
    }

    // Carrega após 500ms ou interação (o que vier primeiro)
    setTimeout(loadSpline, 500);
    window.addEventListener('scroll', loadSpline, { once: true });
    window.addEventListener('mousemove', loadSpline, { once: true });
    window.addEventListener('touchstart', loadSpline, { once: true });
  </script>

  <div id="spatial-wrapper">
    <!-- Barra Lateral Esquerda -->
    <aside id="sidebar-nav" role="banner">
      <div class="sidebar-header">
        <h1><a href="#" id="nav-home" aria-label="Ir para a página inicial"><i class="ph ph-globe-hemisphere-west"></i> Repertório PIBIC</a></h1>
      </div>
      
      <button id="mobile-menu-btn" aria-label="Abrir menu de navegação" aria-expanded="false" aria-controls="nav-drawer">
        <i class="ph ph-list"></i>
      </button>

      <nav id="nav-drawer" role="navigation" aria-label="Menu Principal">
        <button id="nav-catalog" class="btn-nav" role="menuitem"><i class="ph ph-books" aria-hidden="true"></i> <span>Repertório</span></button>
        <button id="nav-graph" class="btn-nav" role="menuitem"><i class="ph ph-graph" aria-hidden="true"></i> <span>Grafo</span></button>
        <button id="nav-timeline" class="btn-nav" role="menuitem"><i class="ph ph-clock-counter-clockwise" aria-hidden="true"></i> <span>Evolução</span></button>
        <button id="nav-dashboard" class="btn-nav" role="menuitem"><i class="ph ph-chart-bar" aria-hidden="true"></i> <span>Panorama</span></button>
        <button id="nav-about" class="btn-nav" role="menuitem"><i class="ph ph-info" aria-hidden="true"></i> <span>Sobre</span></button>
      </nav>

      <footer>
        <p>Levantamento Sistemático (2026)</p>
      </footer>
    </aside>

    <!-- Área de Conteúdo Principal Flutuante -->
    <main id="app-content" role="main" aria-live="polite">
    </main>

    <!-- Painel Lateral Deslizante (Off-Canvas Drawer) -->
    <div id="detail-drawer" class="drawer-hidden">
      <div class="drawer-overlay" id="drawer-overlay" aria-label="Fechar painel"></div>
      <div class="drawer-content" id="drawer-content-area">
        <!-- Renderizado dinamicamente -->
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="text/javascript" src="https://unpkg.com/vis-data@latest/dist/vis-data.min.js"></script>
  <script type="text/javascript" src="https://unpkg.com/vis-timeline@latest/dist/vis-timeline-graph2d.min.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>

</html>
