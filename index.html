<body>
  <a href="#app-content" class="skip-link">Pular para o conteúdo principal</a>

  <!-- Tela de Carregamento -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Carregando ambiente virtual...</p>
  </div>

  <div id="canvas-wrapper" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: #0B1120; transform: scale(1.15);">
    <canvas id="canvas3d" style="width: 100%; height: 100%; outline: none; pointer-events: auto;"></canvas>
  </div>
  <script type="module">
    import { Application } from '@splinetool/runtime';
    const canvas = document.getElementById('canvas3d');
    const app = new Application(canvas);
    
    // Lazy load do ambiente 3D para melhorar performance (Performance Phase 7)
    let splineLoaded = false;
    function loadSpline() {
      if (splineLoaded) return;
      splineLoaded = true;
      app.load('https://prod.spline.design/MDqj8k8BrzSkdzO5/scene.splinecode')
        .then(() => {
          const loader = document.getElementById('loader');
          if (loader) {
            loader.classList.add('hidden-loader');
            setTimeout(() => loader.remove(), 500); // Remove do DOM após o fade
          }
        })
        .catch((error) => {
          console.error('Erro ao carregar modelo 3D do Spline:', error);
          const loader = document.getElementById('loader');
          if (loader) {
            loader.innerHTML = '<p style="color: #ef4444;">O ambiente virtual está privado ou indisponível.</p>';
            setTimeout(() => loader.classList.add('hidden-loader'), 3000);
          }
        });
    }

    // Carrega após 500ms ou interação (o que vier primeiro)
    setTimeout(loadSpline, 500);
    window.addEventListener('scroll', loadSpline, { once: true });
    window.addEventListener('mousemove', loadSpline, { once: true });
    window.addEventListener('touchstart', loadSpline, { once: true });

    // Script agressivo para remover a marca d'água do Spline (Shadow DOM)
    setInterval(() => {
      // O Spline cria uma div sem ID anexada ao body com um shadowRoot
      const divs = document.querySelectorAll('body > div');
      divs.forEach(div => {
        // Se a div possui um shadowRoot contendo o logo ou link do spline
        if (div.shadowRoot) {
          const content = div.shadowRoot.innerHTML;
          if (content.includes('spline') || content.includes('Logo')) {
            div.remove();
          }
        }
        // Fallback: se a div tiver posição absoluta no canto inferior direito
        if (div.style.position === 'absolute' && (div.style.right === '20px' || div.style.right === '16px') && parseInt(div.style.zIndex) > 1000) {
          div.remove();
        }
      });
      // Fallback para âncoras diretas
      document.querySelectorAll('a[href*="spline.design"]').forEach(a => a.remove());
    }, 1000);
  </script>
