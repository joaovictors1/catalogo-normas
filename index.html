<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Normas | Regulação do Uso da Força</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
    rel="stylesheet">

  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet"
    type="text/css" />

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "@splinetool/runtime": "https://unpkg.com/@splinetool/runtime@1.9.44/build/runtime.js"
      }
    }
  </script>
</head>

<body>
  <!-- Tela de Carregamento -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Carregando ambiente virtual...</p>
  </div>

  <canvas id="canvas3d"></canvas>
  <script type="module">
    import { Application } from '@splinetool/runtime';
    const canvas = document.getElementById('canvas3d');
    const app = new Application(canvas);
    
    app.load('https://prod.spline.design/MDqj8k8BrzSkdzO5/scene.splinecode')
      .then(() => {
        const loader = document.getElementById('loader');
        if (loader) {
          loader.classList.add('hidden-loader');
          setTimeout(() => loader.remove(), 500); // Remove do DOM após o fade
        }
      })
      .catch((error) => {
        console.error('Erro ao carregar modelo 3D do Spline:', error);
        const loader = document.getElementById('loader');
        if (loader) {
          loader.innerHTML = '<p style="color: #ef4444;">O ambiente virtual está privado ou indisponível.</p>';
          setTimeout(() => loader.classList.add('hidden-loader'), 3000);
        }
      });
  </script>

  <div id="glass-wrapper">
    <header>
    <div class="header-container">
      <h1><a href="#" id="nav-home">Catálogo Normativo: Uso da Força</a></h1>
      <nav>
        <button id="nav-catalog" class="btn-text"><i class="ph ph-books"></i> Catálogo</button>
        <button id="nav-timeline" class="btn-text"><i class="ph ph-clock-counter-clockwise"></i> Linha do Tempo</button>
        <button id="nav-about" class="btn-text"><i class="ph ph-info"></i> Sobre</button>
      </nav>
    </div>
  </header>

  <main id="app-content">
  </main>

  <footer>
    <div class="footer-container">
      <p>Projeto de Pesquisa Acadêmica | Baseado em Levantamento Sistemático (Maio/2026)</p>
      <p class="disclaimer">Aviso Legal: Site com finalidade informativa e educacional. Não substitui interpretação
        jurídica especializada.</p>
    </div>
  </footer>

  <script type="text/javascript" src="https://unpkg.com/vis-data@latest/dist/vis-data.min.js"></script>
  <script type="text/javascript" src="https://unpkg.com/vis-timeline@latest/dist/vis-timeline-graph2d.min.js"></script>

  <script src="data.js"></script>
  <script src="script.js"></script>
  </div>
</body>

</html>
